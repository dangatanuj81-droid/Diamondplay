<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiamondPlay - Gaming Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --accent: #F77F00;
            --success: #06A77D;
            --danger: #D62828;
            --warning: #F77F00;
            --dark: #1a1a1a;
            --light: #f5f5f5;
            --border: #e0e0e0;
            --text: #333;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
        }

        #root {
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .header-subtitle {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            background: white;
            position: sticky;
            top: 60px;
            z-index: 99;
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 0.9em;
            font-weight: 500;
            white-space: nowrap;
            background: white;
            color: var(--text);
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #fff8f5;
        }

        .nav-tab:hover {
            background: #f9f9f9;
        }

        .content {
            padding: 20px;
            padding-bottom: 100px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #e55a2b;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #00365f;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #058b68;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c01f1f;
        }

        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-block {
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.85em;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .game-card {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .game-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .game-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .game-cost {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9em;
            color: var(--text);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            font-size: 1.3em;
            color: var(--secondary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--secondary);
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .table tr:hover {
            background: #f9f9f9;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-success {
            background: #e8f5e9;
            color: var(--success);
        }

        .badge-danger {
            background: #ffebee;
            color: var(--danger);
        }

        .badge-warning {
            background: #fff8e1;
            color: var(--warning);
        }

        .badge-primary {
            background: #fff3e0;
            color: var(--primary);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid;
        }

        .alert-success {
            background: #e8f5e9;
            border-left-color: var(--success);
            color: var(--success);
        }

        .alert-error {
            background: #ffebee;
            border-left-color: var(--danger);
            color: var(--danger);
        }

        .alert-info {
            background: #e3f2fd;
            border-left-color: #2196f3;
            color: #2196f3;
        }

        .notification-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .game-result {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-radius: 12px;
            margin: 20px 0;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-result.win {
            background: linear-gradient(135deg, var(--success), #4caf50);
        }

        .game-result.lose {
            background: linear-gradient(135deg, var(--danger), #f44336);
        }

        .player-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-details {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .color-option {
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .color-option:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .color-option.selected {
            border-color: var(--primary);
            background: #fff8f5;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .number-btn {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: white;
        }

        .number-btn:hover {
            border-color: var(--primary);
        }

        .number-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .dice-display {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            margin: 20px auto;
            box-shadow: var(--shadow-lg);
            animation: roll 0.6s ease;
        }

        @keyframes roll {
            0% { transform: rotateX(0) rotateY(0); }
            50% { transform: rotateX(20deg) rotateY(20deg); }
            100% { transform: rotateX(0) rotateY(0); }
        }

        .scratch-card {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
            cursor: crosshair;
            position: relative;
            overflow: hidden;
        }

        .scratch-text {
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .tabs-content {
            display: none;
        }

        .tabs-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .settings-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .settings-section-title {
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-label {
            flex: 1;
        }

        .setting-value {
            font-weight: 600;
            color: var(--primary);
        }

        .toggle {
            width: 50px;
            height: 28px;
            background: var(--border);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle.on {
            background: var(--success);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        .toggle.on::after {
            left: 24px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
        }

        .pagination-btn {
            width: 35px;
            height: 35px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination-btn:hover,
        .pagination-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                box-shadow: none;
            }

            .stat-grid,
            .game-grid {
                grid-template-columns: 1fr;
            }

            .table {
                font-size: 0.8em;
            }

            .table th,
            .table td {
                padding: 8px;
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            background: white;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0 auto;
            z-index: 50;
        }

        .bottom-nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-top: 3px solid transparent;
            transition: all 0.3s;
            color: var(--text);
        }

        .bottom-nav-item.active {
            color: var(--primary);
            border-top-color: var(--primary);
            background: #fff8f5;
        }

        .nav-icon {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .nav-label {
            font-size: 0.7em;
            font-weight: 600;
        }

        .success-animation {
            animation: successPop 0.5s ease;
        }

        @keyframes successPop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .spin {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── PERSISTENT STORAGE ───
        const _memoryStore = {};
        const _hasLocalStorage = (() => {
            try {
                const t = "__dp_ls_test__";
                window.localStorage.setItem(t, "1");
                window.localStorage.removeItem(t);
                return true;
            } catch { return false; }
        })();

        const DB = {
            get: (key) => {
                try {
                    if (_hasLocalStorage) {
                        const raw = window.localStorage.getItem(key);
                        return raw === null ? null : JSON.parse(raw);
                    }
                    const v = _memoryStore[key];
                    return v === undefined ? null : JSON.parse(JSON.stringify(v));
                } catch { return null; }
            },
            set: (key, val) => {
                try {
                    if (_hasLocalStorage) {
                        window.localStorage.setItem(key, JSON.stringify(val));
                        return true;
                    }
                    _memoryStore[key] = JSON.parse(JSON.stringify(val));
                    return true;
                } catch { return false; }
            },
            del: (key) => {
                try {
                    if (_hasLocalStorage) { window.localStorage.removeItem(key); return; }
                    delete _memoryStore[key];
                } catch {}
            },
        };

        // ─── INITIALIZE DATABASE ───

                ]);
                DB.set("dp_transactions", [
                    { id: "t1", userId: "demo_user", type: "deposit", amount: 1000, status: "completed", date: new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString() },
                    { id: "t2", userId: "demo_user", type: "withdraw", amount: 200, status: "completed", date: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString() },

                DB.set("dp_notifications_admin", []);

                DB.set("dp_platform_config", {

                    tournamentPrizes: [
                        { rank: 1, label: "🥇 1st Place", prize: 5000, color: "#ffd700", active: true },
                        { rank: 2, label: "🥈 2nd Place", prize: 2500, color: "#c0c0c0", active: true },
                        { rank: 3, label: "🥉 3rd Place", prize: 1000, color: "#cd7f32", active: true },
                        { rank: 4, label: "4th–5th", prize: 500, color: "#00d4ff", active: true },
                        { rank: 6, label: "6th–10th", prize: 200, color: "#b537f2", active: true },
                    ],
                });
                DB.set("dp_diamond_packs", [
                    { id: "p1", diamonds: 100, price: 100, bonus: 0, popular: false, label: "Starter" },
                    { id: "p2", diamonds: 500, price: 490, bonus: 10, popular: false, label: "Basic" },
                    { id: "p3", diamonds: 1000, price: 950, bonus: 50, popular: true, label: "Popular" },
                    { id: "p4", diamonds: 2500, price: 2300, bonus: 200, popular: false, label: "Pro" },
                    { id: "p5", diamonds: 5000, price: 4500, bonus: 500, popular: false, label: "Elite" },
                    { id: "p6", diamonds: 10000, price: 8500, bonus: 1500, popular: false, label: "VIP" },
                ]);
                DB.set("dp_game_bets", [
                    { id: "g1", userId: "demo_user", gameType: "color_prediction", bet: 50, result: "red", won: true, amount: 100, date: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString() },
                    { id: "g2", userId: "demo_user", gameType: "dice_roll", bet: 50, result: 4, won: false, amount: 0, date: new Date(Date.now() - 0.5 * 24 * 60 * 60 * 1000).toISOString() },
                ]);
                DB.set("dp_initialized", true);
            }
        };

        initDB();

        // ─── MAIN APP COMPONENT ───
        function DiamondPlayApp() {
            const [currentUser, setCurrentUser] = useState(null);
            const [tab, setTab] = useState("home");
            const [loginData, setLoginData] = useState({ phone: "", password: "" });
            const [signupData, setSignupData] = useState({ name: "", phone: "", password: "", referralCode: "" });
            const [showModal, setShowModal] = useState(false);
            const [modalContent, setModalContent] = useState(null);
            const [notification, setNotification] = useState(null);
            const [selectedGame, setSelectedGame] = useState(null);
            const [gameData, setGameData] = useState({});

            // Load user from localStorage
            useEffect(() => {
                const saved = DB.get("dp_current_user");
                if (saved) {
                    setCurrentUser(saved);
                    setTab("home");
                }
            }, []);

            const showNotification = (message, type = "success") => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = () => {
                const users = DB.get("dp_users") || [];
                const user = users.find(u => u.phone === loginData.phone && u.password === loginData.password);
                if (user) {
                    DB.set("dp_current_user", user);
                    setCurrentUser(user);
                    setTab("home");
                    showNotification("Login successful!");
                } else {
                    showNotification("Invalid credentials", "error");
                }
            };

            const handleSignup = () => {
                const users = DB.get("dp_users") || [];
                if (users.some(u => u.phone === signupData.phone)) {
                    showNotification("Phone number already registered", "error");
                    return;
                }
                const newUser = {
                    id: `user_${Date.now()}`,
                    name: signupData.name,
                    phone: signupData.phone,
                    password: signupData.password,
                    diamonds: 100,
                    referralCode: `REF${Math.random().toString(36).substr(2, 6).toUpperCase()}`,
                    referredBy: signupData.referralCode || null,
                    totalDeposited: 0,
                    totalWithdrawn: 0,
                    gamesPlayed: 0,
                    joinedAt: new Date().toISOString(),
                    isAdmin: false,
                    email: "",
                    isAgent: false,
                    commissionPaid: 0,
                    customCommissionPercent: null,
                };
                users.push(newUser);
                DB.set("dp_users", users);
                DB.set("dp_current_user", newUser);
                setCurrentUser(newUser);
                setTab("home");
                showNotification("Signup successful!");
            };

            const handleLogout = () => {
                DB.del("dp_current_user");
                setCurrentUser(null);
                setTab("home");
                showNotification("Logged out!");
            };

            const updateUser = (updates) => {
                const users = DB.get("dp_users") || [];
                const idx = users.findIndex(u => u.id === currentUser.id);
                if (idx >= 0) {
                    users[idx] = { ...users[idx], ...updates };
                    DB.set("dp_users", users);
                    setCurrentUser(users[idx]);
                    DB.set("dp_current_user", users[idx]);
                }
            };

            const playGame = (gameType, amount) => {
                if (currentUser.diamonds < amount) {
                    showNotification("Insufficient diamonds", "error");
                    return;
                }

                let won = false;
                let winAmount = 0;

                if (gameType === "color_prediction") {
                    const colors = ["red", "black", "green"];
                    const selectedColor = gameData.selectedColor || colors[Math.floor(Math.random() * colors.length)];
                    const resultColor = colors[Math.floor(Math.random() * colors.length)];
                    won = selectedColor === resultColor;
                    winAmount = won ? amount * 2 : 0;
                } else if (gameType === "dice_roll") {
                    const selectedNumber = gameData.selectedDice || Math.floor(Math.random() * 6) + 1;
                    const resultNumber = Math.floor(Math.random() * 6) + 1;
                    won = selectedNumber === resultNumber;
                    winAmount = won ? amount * 5 : 0;
                } else if (gameType === "number_pick") {
                    const selectedNumber = gameData.selectedNumber || Math.floor(Math.random() * 100);
                    const resultNumber = Math.floor(Math.random() * 100);
                    won = selectedNumber === resultNumber;
                    winAmount = won ? amount * 10 : 0;
                } else if (gameType === "scratch_card") {
                    won = Math.random() < 0.3;
                    winAmount = won ? amount * 3 : 0;
                }

                updateUser({
                    diamonds: currentUser.diamonds - amount + winAmount,
                    gamesPlayed: currentUser.gamesPlayed + 1,
                });

                const bet = {
                    id: `g_${Date.now()}`,
                    userId: currentUser.id,
                    gameType,
                    bet: amount,
                    won,
                    winAmount,
                    date: new Date().toISOString(),
                };

                const bets = DB.get("dp_game_bets") || [];
                bets.push(bet);
                DB.set("dp_game_bets", bets);

                setSelectedGame({ type: gameType, result: won, amount: winAmount });
                showNotification(won ? `You won ₹${winAmount}!` : "You lost this round", won ? "success" : "error");
            };

            // LOGIN SCREEN
            if (!currentUser) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>💎 DiamondPlay</h1>
                            <p className="header-subtitle">Win Big, Play Smart</p>
                        </div>

                        <div className="content">
                            {notification && (
                                <div className={`alert alert-${notification.type === "error" ? "error" : "success"}`}>
                                    {notification.message}
                                </div>
                            )}

                            <div className="card">
                                <div className="card-title">Login</div>
                                <div className="input-group">
                                    <label className="input-label">Phone Number</label>
                                    <input
                                        type="text"
                                        placeholder="Enter phone number"
                                        value={loginData.phone}
                                        onChange={(e) => setLoginData({ ...loginData, phone: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label className="input-label">Password</label>
                                    <input
                                        type="password"
                                        placeholder="Enter password"
                                        value={loginData.password}
                                        onChange={(e) => setLoginData({ ...loginData, password: e.target.value })}
                                    />
                                </div>
                                <button className="btn btn-primary btn-block" onClick={handleLogin}>
                                    Login
                                </button>
                                <p style={{ textAlign: "center", marginTop: "15px", fontSize: "0.9em" }}>
                                    Demo: 9999999999 / demo123
                                </p>
                            </div>

                            <div className="card">
                                <div className="card-title">Create Account</div>
                                <div className="input-group">
                                    <label className="input-label">Full Name</label>
                                    <input
                                        type="text"
                                        placeholder="Enter your name"
                                        value={signupData.name}
                                        onChange={(e) => setSignupData({ ...signupData, name: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label className="input-label">Phone Number</label>
                                    <input
                                        type="text"
                                        placeholder="Enter phone number"
                                        value={signupData.phone}
                                        onChange={(e) => setSignupData({ ...signupData, phone: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label className="input-label">Password</label>
                                    <input
                                        type="password"
                                        placeholder="Create password"
                                        value={signupData.password}
                                        onChange={(e) => setSignupData({ ...signupData, password: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label className="input-label">Referral Code (Optional)</label>
                                    <input
                                        type="text"
                                        placeholder="Enter referral code"
                                        value={signupData.referralCode}
                                        onChange={(e) => setSignupData({ ...signupData, referralCode: e.target.value })}
                                    />
                                </div>
                                <button className="btn btn-secondary btn-block" onClick={handleSignup}>
                                    Sign Up
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // MAIN APP
            return (
                <div className="container">
                    <div className="header">
                        <h1>💎 DiamondPlay</h1>
                        <p className="header-subtitle">Welcome, {currentUser.name}</p>
                    </div>

                    {notification && (
                        <div style={{ padding: "20px", paddingTop: "10px" }}>
                            <div className={`alert alert-${notification.type === "error" ? "error" : "success"}`}>
                                {notification.message}
                            </div>
                        </div>
                    )}

                    <div className="nav-tabs">
                        <div className={`nav-tab ${tab === "home" ? "active" : ""}`} onClick={() => setTab("home")}>🏠 Home</div>
                        <div className={`nav-tab ${tab === "games" ? "active" : ""}`} onClick={() => setTab("games")}>🎮 Games</div>
                        <div className={`nav-tab ${tab === "wallet" ? "active" : ""}`} onClick={() => setTab("wallet")}>💰 Wallet</div>
                        <div className={`nav-tab ${tab === "account" ? "active" : ""}`} onClick={() => setTab("account")}>👤 Account</div>
                        {currentUser.isAdmin && <div className={`nav-tab ${tab === "admin" ? "active" : ""}`} onClick={() => setTab("admin")}>⚙️ Admin</div>}
                    </div>

                    <div className="content">
                        {/* HOME TAB */}
                        {tab === "home" && (
                            <>
                                <div className="player-profile">
                                    <div className="profile-avatar">💎</div>
                                    <div className="profile-info">
                                        <div className="profile-name">{currentUser.name}</div>
                                        <div className="profile-details">
                                            {currentUser.diamonds} Diamonds | {currentUser.gamesPlayed} Games Played
                                        </div>
                                    </div>
                                </div>

                                <div className="stat-grid">
                                    <div className="stat-box">
                                        <div className="stat-label">Total Deposited</div>
                                        <div className="stat-value">₹{currentUser.totalDeposited}</div>
                                    </div>
                                    <div className="stat-box">
                                        <div className="stat-label">Total Withdrawn</div>
                                        <div className="stat-value">₹{currentUser.totalWithdrawn}</div>
                                    </div>
                                </div>

                                <div className="card">
                                    <div className="card-title">🎯 Quick Actions</div>
                                    <button className="btn btn-primary btn-block" onClick={() => { setTab("wallet"); }}>
                                        Deposit Diamonds
                                    </button>
                                    <button className="btn btn-secondary btn-block" onClick={() => { setTab("wallet"); }}>
                                        Withdraw Cash
                                    </button>
                                </div>

                                <div className="card">
                                    <div className="card-title">📊 Your Referral Code</div>
                                    <p style={{ fontSize: "0.9em", marginBottom: "10px" }}>Share to earn 10% commission</p>
                                    <div style={{
                                        background: "#f5f5f5",
                                        padding: "15px",
                                        borderRadius: "8px",
                                        textAlign: "center",
                                        fontWeight: "600",
                                        fontSize: "1.2em",
                                        color: "var(--primary)",
                                        wordBreak: "break-all"
                                    }}>
                                        {currentUser.referralCode}
                                    </div>
                                </div>
                            </>
                        )}

                        {/* GAMES TAB */}
                        {tab === "games" && (
                            <>
                                <div className="card">
                                    <div className="card-title">🎮 Available Games</div>
                                    <div className="game-grid">
                                        <div className="game-card" onClick={() => { setModalContent({ type: "color_prediction" }); setShowModal(true); }}>
                                            <div className="game-icon">🎨</div>
                                            <div className="game-name">Color Prediction</div>
                                            <div className="game-cost">₹5 per game</div>
                                        </div>
                                        <div className="game-card" onClick={() => { setModalContent({ type: "dice_roll" }); setShowModal(true); }}>
                                            <div className="game-icon">🎲</div>
                                            <div className="game-name">Dice Roll</div>
                                            <div className="game-cost">₹5 per game</div>
                                        </div>
                                        <div className="game-card" onClick={() => { setModalContent({ type: "number_pick" }); setShowModal(true); }}>
                                            <div className="game-icon">🔢</div>
                                            <div className="game-name">Number Pick</div>
                                            <div className="game-cost">₹5 per game</div>
                                        </div>
                                        <div className="game-card" onClick={() => { setModalContent({ type: "scratch_card" }); setShowModal(true); }}>
                                            <div className="game-icon">🎫</div>
                                            <div className="game-name">Scratch Card</div>
                                            <div className="game-cost">₹10 per game</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="card">
                                    <div className="card-title">🏆 Recent Games</div>
                                    {(() => {
                                        const bets = (DB.get("dp_game_bets") || []).filter(b => b.userId === currentUser.id).slice(-5).reverse();
                                        return bets.length > 0 ? (
                                            <table className="table">
                                                <thead>
                                                    <tr>
                                                        <th>Game</th>
                                                        <th>Bet</th>
                                                        <th>Result</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {bets.map(bet => (
                                                        <tr key={bet.id}>
                                                            <td>{bet.gameType}</td>
                                                            <td>₹{bet.bet}</td>
                                                            <td><span className={`badge badge-${bet.won ? "success" : "danger"}`}>{bet.won ? "Won" : "Lost"}</span></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        ) : <p>No games played yet</p>;
                                    })()}
                                </div>
                            </>
                        )}

                        {/* WALLET TAB */}
                        {tab === "wallet" && (
                            <>
                                <div className="card">
                                    <div className="card-title">💳 Deposit Diamonds</div>
                                    <div className="input-group">
                                        <label className="input-label">Select Diamond Pack</label>
                                        <select>
                                            {(DB.get("dp_diamond_packs") || []).map(pack => (
                                                <option key={pack.id} value={pack.id}>
                                                    {pack.label}: {pack.diamonds} 💎 for ₹{pack.price} {pack.bonus > 0 ? `+ ₹${pack.bonus} bonus` : ""}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <button className="btn btn-primary btn-block" onClick={() => {
                                        showNotification("Razorpay integration coming soon!");
                                    }}>
                                        Pay with Razorpay
                                    </button>
                                </div>

                                <div className="card">
                                    <div className="card-title">💸 Withdraw Cash</div>
                                    <div className="input-group">
                                        <label className="input-label">Amount (₹)</label>
                                        <input type="number" placeholder="Min ₹200" />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">UPI ID</label>
                                        <input type="text" placeholder="yourname@upi" />
                                    </div>
                                    <button className="btn btn-success btn-block" onClick={() => showNotification("Withdrawal request submitted!")}>
                                        Request Withdrawal
                                    </button>
                                </div>

                                <div className="card">
                                    <div className="card-title">📱 Transactions</div>
                                    {(() => {
                                        const txns = (DB.get("dp_transactions") || []).filter(t => t.userId === currentUser.id).slice(-10);
                                        return txns.length > 0 ? (
                                            <table className="table">
                                                <thead>
                                                    <tr>
                                                        <th>Type</th>
                                                        <th>Amount</th>
                                                        <th>Status</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {txns.map(txn => (
                                                        <tr key={txn.id}>
                                                            <td>{txn.type}</td>
                                                            <td>₹{txn.amount}</td>
                                                            <td><span className={`badge badge-${txn.status === "completed" ? "success" : "warning"}`}>{txn.status}</span></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        ) : <p>No transactions yet</p>;
                                    })()}
                                </div>
                            </>
                        )}

                        {/* ACCOUNT TAB */}
                        {tab === "account" && (
                            <>
                                <div className="card">
                                    <div className="card-title">👤 Profile Information</div>
                                    <div style={{ marginBottom: "15px" }}>
                                        <strong>Name:</strong> {currentUser.name}
                                    </div>
                                    <div style={{ marginBottom: "15px" }}>
                                        <strong>Phone:</strong> {currentUser.phone}
                                    </div>
                                    <div style={{ marginBottom: "15px" }}>
                                        <strong>Email:</strong> {currentUser.email || "Not set"}
                                    </div>
                                    <div style={{ marginBottom: "15px" }}>
                                        <strong>Joined:</strong> {new Date(currentUser.joinedAt).toLocaleDateString()}
                                    </div>
                                </div>

                                <div className="card">
                                    <div className="card-title">🔐 Security</div>
                                    <button className="btn btn-outline btn-block" onClick={() => showNotification("Change password feature coming soon!")}>
                                        Change Password
                                    </button>
                                </div>

                                <div className="card">
                                    <div className="card-title">⚙️ Settings</div>
                                    <div className="setting-row">
                                        <div className="setting-label">Push Notifications</div>
                                        <div className="toggle on"></div>
                                    </div>
                                    <div className="setting-row">
                                        <div className="setting-label">Dark Mode</div>
                                        <div className="toggle"></div>
                                    </div>
                                </div>

                                <button className="btn btn-danger btn-block" onClick={handleLogout}>
                                    Logout
                                </button>
                            </>
                        )}

                        {/* ADMIN TAB */}
                        {tab === "admin" && currentUser.isAdmin && (
                            <>
                                <div className="stat-grid">
                                    <div className="stat-box">
                                        <div className="stat-label">Total Users</div>
                                        <div className="stat-value">{(DB.get("dp_users") || []).length}</div>
                                    </div>
                                    <div className="stat-box">
                                        <div className="stat-label">Total Games</div>
                                        <div className="stat-value">{(DB.get("dp_game_bets") || []).length}</div>
                                    </div>
                                </div>

                                <div className="card">
                                    <div className="card-title">📊 Platform Config</div>
                                    {(() => {
                                        const config = DB.get("dp_platform_config") || {};
                                        return (
                                            <>
                                                <div style={{ marginBottom: "10px" }}>
                                                    <strong>Min Deposit:</strong> ₹{config.minDeposit}
                                                </div>
                                                <div style={{ marginBottom: "10px" }}>
                                                    <strong>Withdraw Fee:</strong> {config.withdrawFeePercent}%
                                                </div>
                                                <div style={{ marginBottom: "10px" }}>
                                                    <strong>Agent Commission:</strong> {config.agentCommissionPercent}%
                                                </div>
                                                <div style={{ marginBottom: "10px" }}>
                                                    <strong>Dice Win Rate:</strong> {config.diceWinRate}%
                                                </div>
                                                <button className="btn btn-primary btn-block" onClick={() => showNotification("Config editor coming soon!")}>
                                                    Edit Configuration
                                                </button>
                                            </>
                                        );
                                    })()}
                                </div>

                                <div className="card">
                                    <div className="card-title">👥 All Users</div>
                                    {(() => {
                                        const users = (DB.get("dp_users") || []).slice(0, 10);
                                        return (
                                            <table className="table">
                                                <thead>
                                                    <tr>
                                                        <th>Name</th>
                                                        <th>Phone</th>
                                                        <th>Diamonds</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {users.map(user => (
                                                        <tr key={user.id}>
                                                            <td>{user.name}</td>
                                                            <td>{user.phone}</td>
                                                            <td>{user.diamonds}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        );
                                    })()}
                                </div>
                            </>
                        )}
                    </div>

                    {/* GAME MODALS */}
                    {showModal && modalContent && (
                        <div className="modal active">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h2>Play Game</h2>
                                    <button className="close-btn" onClick={() => { setShowModal(false); setSelectedGame(null); }}>✕</button>
                                </div>

                                {!selectedGame && (
                                    <>
                                        {modalContent.type === "color_prediction" && (
                                            <div>
                                                <p style={{ marginBottom: "15px" }}>Select a color:</p>
                                                {["red", "black", "green"].map(color => (
                                                    <div
                                                        key={color}
                                                        className={`color-option ${gameData.selectedColor === color ? "selected" : ""}`}
                                                        onClick={() => setGameData({ selectedColor: color })}
                                                    >
                                                        <div className="color-circle" style={{
                                                            background: color === "red" ? "#e74c3c" : color === "black" ? "#2c3e50" : "#27ae60"
                                                        }}></div>
                                                        <span style={{ textTransform: "capitalize", fontWeight: "600" }}>{color}</span>
                                                        <span style={{ marginLeft: "auto", color: "var(--primary)", fontWeight: "600" }}>2x</span>
                                                    </div>
                                                ))}
                                                <button
                                                    className="btn btn-success btn-block"
                                                    style={{ marginTop: "20px" }}
                                                    onClick={() => playGame("color_prediction", 5)}
                                                    disabled={!gameData.selectedColor}
                                                >
                                                    Play (₹5)
                                                </button>
                                            </div>
                                        )}

                                        {modalContent.type === "dice_roll" && (
                                            <div>
                                                <p style={{ marginBottom: "15px" }}>Select a number (1-6):</p>
                                                <div className="number-grid">
                                                    {[1, 2, 3, 4, 5, 6].map(num => (
                                                        <button
                                                            key={num}
                                                            className={`number-btn ${gameData.selectedDice === num ? "selected" : ""}`}
                                                            onClick={() => setGameData({ selectedDice: num })}
                                                        >
                                                            {num}
                                                        </button>
                                                    ))}
                                                </div>
                                                <button
                                                    className="btn btn-success btn-block"
                                                    style={{ marginTop: "20px" }}
                                                    onClick={() => playGame("dice_roll", 5)}
                                                    disabled={!gameData.selectedDice}
                                                >
                                                    Roll (₹5)
                                                </button>
                                            </div>
                                        )}

                                        {modalContent.type === "number_pick" && (
                                            <div>
                                                <p style={{ marginBottom: "15px" }}>Pick a number (0-99):</p>
                                                <div className="input-group">
                                                    <input
                                                        type="number"
                                                        min="0"
                                                        max="99"
                                                        placeholder="Enter number"
                                                        value={gameData.selectedNumber || ""}
                                                        onChange={(e) => setGameData({ selectedNumber: parseInt(e.target.value) })}
                                                    />
                                                </div>
                                                <button
                                                    className="btn btn-success btn-block"
                                                    onClick={() => playGame("number_pick", 5)}
                                                    disabled={gameData.selectedNumber === undefined}
                                                >
                                                    Play (₹5)
                                                </button>
                                            </div>
                                        )}

                                        {modalContent.type === "scratch_card" && (
                                            <div>
                                                <p style={{ marginBottom: "15px" }}>Scratch the card:</p>
                                                <div className="scratch-card">
                                                    <div className="scratch-text">Scratch Here</div>
                                                </div>
                                                <button
                                                    className="btn btn-success btn-block"
                                                    style={{ marginTop: "20px" }}
                                                    onClick={() => playGame("scratch_card", 10)}
                                                >
                                                    Scratch (₹10)
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}

                                {selectedGame && (
                                    <div className={`game-result ${selectedGame.result ? "win" : "lose"}`}>
                                        <div style={{ fontSize: "3em", marginBottom: "10px" }}>
                                            {selectedGame.result ? "🎉" : "😢"}
                                        </div>
                                        <h3 style={{ marginBottom: "10px" }}>
                                            {selectedGame.result ? "You Won!" : "Try Again"}
                                        </h3>
                                        <p>
                                            {selectedGame.result
                                                ? `You won ₹${selectedGame.amount}!`
                                                : `Better luck next time!`
                                            }
                                        </p>
                                        <button
                                            className="btn btn-primary btn-block"
                                            style={{ marginTop: "20px" }}
                                            onClick={() => {
                                                setShowModal(false);
                                                setSelectedGame(null);
                                                setGameData({});
                                            }}
                                        >
                                            Close
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // RENDER APP
        ReactDOM.render(<DiamondPlayApp />, document.getElementById("root"));
    </script>
</body>
</html>
