// ─── ADMIN: AGENT MANAGEMENT PANEL ───────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
const AdminAgents = ({ showToast }) => {
  const [tab, setTab] = useState("overview");
  const [tick, setTick] = useState(0);
  const [search, setSearch] = useState("");
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [commPctEdit, setCommPctEdit] = useState("");
  const [payoutInput, setPayoutInput] = useState("");
  const [confirmPayout, setConfirmPayout] = useState(null);

  const refresh = () => setTick(t => t + 1);

  const cfg     = DB.get("dp_platform_config") || {};
  const commPct = cfg.agentCommissionPct || 5;
  const allUsers = DB.get("dp_users") || [];
  const allTxns  = DB.get("dp_transactions") || [];

  // An agent = any non-admin user who has at least 1 referred user OR has commission txns
  const agentUsers = allUsers.filter(u => {
    if (u.isAdmin) return false;
    const hasReferrals = allUsers.some(x => x.referredBy === u.referralCode);
    const hasCommission = allTxns.some(t => t.userId === u.id && t.type === "agent_commission");
    return hasReferrals || hasCommission;
  });

  // All users: eligible to promote as agent (any real user)
  const allRealUsers = allUsers.filter(u => !u.isAdmin);

  // Per-agent stats
  const getAgentStats = (agent) => {
    const referrals = allUsers.filter(u => u.referredBy === agent.referralCode && !u.isAdmin);
    const commTxns  = allTxns.filter(t => t.userId === agent.id && t.type === "agent_commission");
    const paidTxns  = allTxns.filter(t => t.userId === agent.id && t.type === "agent_payout");
    const totalEarned  = commTxns.reduce((s, t) => s + (t.diamonds || 0), 0);
    const totalPaidOut = paidTxns.reduce((s, t) => s + (t.diamonds || 0), 0);
    const pendingComm  = totalEarned - totalPaidOut;
    const totalRefDeposit = allTxns.filter(t => referrals.some(r => r.id === t.userId) && t.type === "deposit" && t.status === "success").reduce((s, t) => s + t.amount, 0);
    const totalRefLoss = commTxns.reduce((s, t) => s + Math.round((t.diamonds || 0) * 100 / (commPct || 5)), 0);
    const tier = referrals.length === 0 ? "New" : referrals.length < 5 ? "Bronze" : referrals.length < 15 ? "Silver" : referrals.length < 30 ? "Gold" : "Diamond";
    const tierColor = { New: "#aaa", Bronze: "#cd7f32", Silver: "#c0c0c0", Gold: "#ffd700", Diamond: "#00d4ff" }[tier];
    return { referrals, commTxns, totalEarned, totalPaidOut, pendingComm, totalRefDeposit, totalRefLoss, tier, tierColor };
  };

  // Platform totals
  const totalCommPaid    = allTxns.filter(t => t.type === "agent_commission").reduce((s, t) => s + (t.diamonds || 0), 0);
  const totalAgentPayout = allTxns.filter(t => t.type === "agent_payout").reduce((s, t) => s + (t.diamonds || 0), 0);
  const totalPendingComm = totalCommPaid - totalAgentPayout;
  const totalReferredUsers = allUsers.filter(u => u.referredBy && !u.isAdmin).length;

  const saveCommPct = () => {
    const v = parseFloat(commPctEdit);
    if (isNaN(v) || v < 0 || v > 50) { showToast("Enter a valid % (0–50)", "error"); return; }
    DB.set("dp_platform_config", { ...cfg, agentCommissionPct: v });
    showToast(`Commission set to ${v}%`, "success");
    setCommPctEdit("");
    refresh();
  };

  const payoutAgent = (agent) => {
    const amt = parseInt(payoutInput);
    const stats = getAgentStats(agent);
    if (!amt || amt <= 0) { showToast("Enter valid amount", "error"); return; }
    if (amt > stats.pendingComm) { showToast(`Max payable: 💎${stats.pendingComm}`, "error"); return; }
    const txn = { id: tid(), userId: agent.id, type: "agent_payout", amount: 0, diamonds: amt, status: "success", date: new Date().toISOString(), method: "admin", note: `Admin Payout: 💎${amt} commission` };
    const updated = allUsers.map(u => u.id === agent.id ? { ...u, diamonds: u.diamonds + amt } : u);
    DB.set("dp_users", updated);
    DB.set("dp_transactions", [txn, ...allTxns]);
    showToast(`💎${amt} paid to ${agent.name}`, "success");
    setConfirmPayout(null);
    setPayoutInput("");
    setSelectedAgent(null);
    refresh();
  };

  const setCustomCommPct = (agentId, pct) => {
    const updated = allUsers.map(u => u.id === agentId ? { ...u, customCommPct: pct } : u);
    DB.set("dp_users", updated);
    showToast(`Custom ${pct}% set`, "success");
    refresh();
  };

  const removeCustomComm = (agentId) => {
    const updated = allUsers.map(u => u.id === agentId ? { ...u, customCommPct: undefined } : u);
    DB.set("dp_users", updated);
    showToast("Custom rate removed", "success");
    refresh();
  };

  const tierBadge = (tier, color) => (
    <span style={{ background: `${color}22`, border: `1px solid ${color}66`, color, borderRadius: 8, padding: "2px 8px", fontSize: 11, fontWeight: 800 }}>{tier}</span>
  );

  const filtered = (tab === "overview" ? agentUsers : allRealUsers)
    .filter(u => !search || u.name.toLowerCase().includes(search.toLowerCase()) || u.phone.includes(search));

  return (
    <div style={S.page}>
      {/* Confirm Payout Modal */}
      {confirmPayout && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#13132e", borderRadius: 20, padding: 24, width: "100%", maxWidth: 340, border: "1px solid rgba(255,215,0,0.25)" }}>
            <div style={{ fontSize: 44, textAlign: "center", marginBottom: 10 }}>💸</div>
            <div style={{ fontSize: 17, fontWeight: 800, textAlign: "center", marginBottom: 6 }}>Confirm Payout</div>
            <div style={{ textAlign: "center", color: "rgba(255,255,255,0.5)", fontSize: 13, marginBottom: 16 }}>
              Pay <strong style={{ color: "#ffd700" }}>💎{payoutInput}</strong> to <strong>{confirmPayout.name}</strong>?<br />
              <span style={{ fontSize: 11 }}>This will credit diamonds to their wallet.</span>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn full sm variant="ghost" onClick={() => setConfirmPayout(null)}>Cancel</Btn>
              <Btn full sm variant="gold" onClick={() => payoutAgent(confirmPayout)}>✓ Pay Now</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background: "linear-gradient(180deg,rgba(0,255,136,0.08),transparent)", padding: "16px 20px 12px" }}>
        <div style={{ fontSize: 22, fontWeight: 900, marginBottom: 2 }}>🤝 Agent System</div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", marginBottom: 14 }}>Referral commissions · Payouts · Settings</div>

        {/* Platform Summary */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
          {[
            ["🤝 Total Agents", agentUsers.length, S.neonBlue],
            ["👥 Referred Users", totalReferredUsers, S.neonPurple],
            ["💎 Comm Earned", fmt(totalCommPaid) + " 💎", S.neonGold],
            ["⏳ Pending Payout", fmt(totalPendingComm) + " 💎", S.neonPink],
          ].map(([l, v, c]) => (
            <Card key={l} style={{ padding: 12, textAlign: "center" }}>
              <div style={{ fontWeight: 900, fontSize: 17, color: c }}>{v}</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{l}</div>
            </Card>
          ))}
        </div>

        {/* Commission Rate Control */}
        <Card style={{ background: "rgba(255,215,0,0.07)", border: "1px solid rgba(255,215,0,0.2)", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>

const AdminUsers = () => {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [giftAmt, setGiftAmt] = useState("");
  const [tick, setTick] = useState(0);
  const users = (DB.get("dp_users") || []).filter(u => !u.isAdmin).filter(u =>
    !search || u.name.toLowerCase().includes(search.toLowerCase()) || u.phone.includes(search)
  );

  const giftDiamonds = (userId) => {
    const amt = parseInt(giftAmt);
    if (!amt || amt <= 0) return;
    const allUsers = DB.get("dp_users") || [];
    const updated = allUsers.map(u => u.id === userId ? { ...u, diamonds: u.diamonds + amt } : u);
    DB.set("dp_users", updated);
    const txns = DB.get("dp_transactions") || [];
    DB.set("dp_transactions", [{ id: tid(), userId, type: "bonus", amount: 0, diamonds: amt, status: "success", date: new Date().toISOString(), method: "admin", note: `Admin Gift: ${amt} Diamonds` }, ...txns]);
    setGiftAmt(""); setSelected(null); setTick(t => t + 1);
  };

  const banUser = (userId) => {
    const allUsers = DB.get("dp_users") || [];
    const updated = allUsers.map(u => u.id === userId ? { ...u, banned: !u.banned } : u);
    DB.set("dp_users", updated);
    setTick(t => t + 1);
  };

  return (
    <div style={S.page}>
      <TopBar title="👥 Users" />
      <div style={{ padding: "0 20px" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search by name or phone..." style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, padding: "12px 14px", color: "#fff", fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 14 }} />
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 10 }}>{users.length} user{users.length !== 1 ? "s" : ""} found</div>
        {users.map(u => (
          <Card key={u.id} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 8 }}>
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: S.gradBlue, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 18 }}>{u.name[0]}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700 }}>{u.name} {u.banned && <Badge label="Banned" color="#ff6b6b" />}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>📱 {u.phone} · {timeAgo(u.joinedAt)}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 800, color: S.neonGold }}>💎{fmt(u.diamonds)}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{u.gamesPlayed} games</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Btn sm variant="ghost" onClick={() => setSelected(selected?.id === u.id ? null : u)}>🎁 Gift</Btn>
              <Btn sm variant={u.banned ? "green" : "danger"} onClick={() => banUser(u.id)}>{u.banned ? "✓ Unban" : "🚫 Ban"}</Btn>
            </div>
            {selected?.id === u.id && (
              <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                <input type="number" placeholder="Diamonds to gift" value={giftAmt} onChange={e => setGiftAmt(e.target.value)} style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, padding: "8px 12px", color: "#fff", fontSize: 13, outline: "none" }} />
                <Btn sm variant="gold" onClick={() => giftDiamonds(u.id)}>Send</Btn>
              </div>
            )}
          </Card>
        ))}
        {users.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.3)" }}>No users found</div>}
      </div>
    </div>
  );
};

// ─── ADMIN DEPOSITS (manual payment approval) ─────────────────────────────────
const AdminDeposits = ({ showToast }) => {
  const [tick, setTick] = useState(0);
  const [filter, setFilter] = useState("pending");

  const allTxns = (DB.get("dp_transactions") || []).filter(t => t.type === "deposit");
  const txns = filter === "all" ? allTxns : allTxns.filter(t => t.status === filter);
  const users = DB.get("dp_users") || [];
  const getUserName = (id) => users.find(u => u.id === id)?.name || id;
  const getUserPhone = (id) => users.find(u => u.id === id)?.phone || "";

  const pendingCount = allTxns.filter(t => t.status === "pending").length;

  const approveDeposit = (txn) => {
    // Credit diamonds to user
    const allUsers = DB.get("dp_users") || [];
    const updatedUsers = allUsers.map(u =>
      u.id === txn.userId
        ? { ...u, diamonds: u.diamonds + txn.diamonds, totalDeposited: u.totalDeposited + txn.amount }
        : u
    );
    DB.set("dp_users", updatedUsers);
    // Update transaction status
    const allT = DB.get("dp_transactions") || [];
    const updatedT = allT.map(t =>
      t.id === txn.id ? { ...t, status: "success", approvedAt: new Date().toISOString() } : t
    );
    DB.set("dp_transactions", updatedT);
    // Push user notification (via their activity feed)
    const userTxns = DB.get("dp_transactions") || [];
    // Mark the txn note as approved
    const finalT = userTxns.map(t =>
      t.id === txn.id ? { ...t, note: t.note + " ✅ Approved" } : t
    );
    DB.set("dp_transactions", finalT);
    setTick(k => k + 1);
    showToast(`✅ Approved! 💎${fmt(txn.diamonds)} credited to ${getUserName(txn.userId)}`, "success");
  };

  const rejectDeposit = (txn) => {
    const allT = DB.get("dp_transactions") || [];
    const updatedT = allT.map(t =>
      t.id === txn.id ? { ...t, status: "rejected", rejectedAt: new Date().toISOString() } : t
    );
    DB.set("dp_transactions", updatedT);
    setTick(k => k + 1);
    showToast(`Deposit rejected — UTR: ${txn.utr}`, "info");
  };

  const statusColor = { pending: S.neonGold, success: S.neonGreen, rejected: "#ff6b6b" };

  return (
    <div style={S.page}>
      <TopBar title="💰 Deposit Requests" />
      <div style={{ padding: "0 20px" }}>
        {pendingCount > 0 && (
          <div style={{ background: "rgba(255,215,0,0.12)", border: `1px solid ${S.neonGold}44`, borderRadius: 14, padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontWeight: 800, color: S.neonGold }}>⏳ {pendingCount} pending verification{pendingCount > 1 ? "s" : ""}</div>
            <Badge label="Action needed" color={S.neonGold} />
          </div>
        )}

        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {["pending", "success", "rejected", "all"].map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{ background: filter === f ? S.gradBlue : "rgba(255,255,255,0.06)", border: "none", color: "#fff", borderRadius: 20, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", textTransform: "capitalize" }}>{f}</button>
          ))}
        </div>

        {txns.length === 0
          ? <Card style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.35)" }}>No {filter} deposits</Card>
          : txns.map(t => (
            <Card key={t.id} style={{ marginBottom: 12, border: t.status === "pending" ? `1px solid ${S.neonGold}44` : undefined, background: t.status === "pending" ? "rgba(255,215,0,0.04)" : S.glass }}>
              {/* Header row */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 15 }}>{getUserName(t.userId)}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>📱 {getUserPhone(t.userId)}</div>
                </div>
                <Badge label={t.status} color={statusColor[t.status] || S.neonBlue} />
              </div>

              {/* Amount row */}
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Pack</div>
                  <div style={{ fontWeight: 700 }}>💎 {fmt(t.diamonds)} Diamonds</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Amount</div>
                  <div style={{ fontWeight: 800, color: S.neonGold, fontSize: 18 }}>{fmtINR(t.amount)}</div>
                </div>
              </div>

              {/* UTR box */}
              {t.utr && (
                <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 10, padding: "8px 12px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)" }}>UTR / Transaction ID</div>
                    <div style={{ fontWeight: 800, fontSize: 15, color: S.neonBlue, letterSpacing: 1 }}>{t.utr}</div>
                  </div>
                  <button onClick={() => { navigator.clipboard?.writeText(t.utr); showToast("UTR copied!", "success"); }} style={{ background: "rgba(255,255,255,0.08)", border: "none", color: "#fff", padding: "6px 10px", borderRadius: 8, cursor: "pointer", fontSize: 12 }}>📋</button>
                </div>
              )}

              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginBottom: 10 }}>{timeAgo(t.date)}</div>

              {/* Action buttons — only for pending */}
              {t.status === "pending" && (
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn full variant="green" sm onClick={() => approveDeposit(t)}>✅ Approve & Credit</Btn>
                  <Btn sm variant="danger" onClick={() => rejectDeposit(t)}>✕ Reject</Btn>
                </div>
              )}
              {t.status === "success" && t.approvedAt && (
                <div style={{ fontSize: 12, color: S.neonGreen }}>✅ Approved {timeAgo(t.approvedAt)}</div>
              )}
              {t.status === "rejected" && (
                <div style={{ fontSize: 12, color: "#ff6b6b" }}>✕ Rejected {t.rejectedAt ? timeAgo(t.rejectedAt) : ""}</div>
              )}
            </Card>
          ))}
      </div>
    </div>
  );
};

// ─── ADMIN COLOR STATS PAGE (Standalone full page) ───────────────────────────
const AdminColorStats = ({ showToast }) => {
  const colorMap   = { red:"#ff4444", green:"#00c853", violet:"#b537f2" };
  const [tick, setTick] = useState(0);
  const [detailColor, setDetailColor] = useState(null);
  const [nextColor,   setNextColor]   = useState(() => (DB.get("dp_platform_config")||{}).forcedColor||null);

  useEffect(() => { const i=setInterval(()=>setTick(t=>t+1),2000); return ()=>clearInterval(i); },[]);

  const cfg      = DB.get("dp_platform_config") || {};
  const curRound = cfg.currentColorRound || (DB.get("dp_color_roundNum")||1);
  const allLive  = DB.get("dp_color_live_bets") || {};
  const live     = allLive[curRound] || { red:{users:0,diamonds:0}, green:{users:0,diamonds:0}, violet:{users:0,diamonds:0}, total:0, bets:[] };
  const history  = Object.keys(allLive).map(Number).sort((a,b)=>b-a).map(k=>({round:k,...allLive[k]}));
  const allUsers = DB.get("dp_users") || [];
  const colorHist = DB.get("dp_color_history") || [];

  const total = live.total || 0;
  const pct   = c => total > 0 ? Math.round(((live[c]?.diamonds||0)/total)*100) : 0;

  // All-time stats from color history
  const allTimeStats = {
    red:    { wins: colorHist.filter(h=>h.color==="red").length,   total: colorHist.length },
    green:  { wins: colorHist.filter(h=>h.color==="green").length, total: colorHist.length },
    violet: { wins: colorHist.filter(h=>h.color==="violet").length,total: colorHist.length },
  };

  const setForce = (color) => {
    const c = DB.get("dp_platform_config")||{};
    DB.set("dp_platform_config",{...c, forcedColor:color, colorAutoMode:false});
    setNextColor(color);
    showToast(`✅ ${color.toUpperCase()} force set for next round!`,"success");
    setTick(t=>t+1);
  };
  const setAuto = () => {
    const bets = { red:live.red?.diamonds||0, green:live.green?.diamonds||0, violet:live.violet?.diamonds||0 };
    const smart = (bets.red===0&&bets.green===0&&bets.violet===0)
      ? ["red","green","red","green"][Math.floor(Math.random()*4)]
      : Object.keys(bets).reduce((a,b)=>bets[a]<=bets[b]?a:b);
    const c = DB.get("dp_platform_config")||{};
    DB.set("dp_platform_config",{...c, forcedColor:smart, colorAutoMode:true});
    setNextColor(smart);
    showToast(`🤖 Auto: ${smart.toUpperCase()} wins next (min payout)`,"success");
    setTick(t=>t+1);
  };
  const clearForce = () => {
    const c = DB.get("dp_platform_config")||{};
    DB.set("dp_platform_config",{...c, forcedColor:null, colorAutoMode:false});
    setNextColor(null);
    showToast("🎲 Random mode ON","info");
    setTick(t=>t+1);
  };

  return (
    <div style={S.page}>
      <TopBar title="🎨 Color Game Admin" />
      <div style={{ padding:"0 20px 20px" }}>

        {/* ─ LIVE ROUND PANEL ─ */}
        <div style={{ fontSize:11, fontWeight:800, color:"rgba(255,255,255,0.4)", letterSpacing:1.5, marginBottom:10 }}>
          📡 ROUND #{curRound} — LIVE BETS
        </div>

        <Card glow style={{ marginBottom:14, textAlign:"center", background:"rgba(0,212,255,0.07)" }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>Total Diamonds Bet</div>
          <div style={{ fontSize:36, fontWeight:900, color:S.neonBlue }}>💎 {fmt(total)}</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>
            {(live.bets||[]).length} player{(live.bets||[]).length!==1?"s":""} placed bets this round
          </div>
        </Card>

        {/* Per-color detailed cards */}
        {["red","green","violet"].map(c => {
          const d = live[c]||{users:0,diamonds:0};
          const p = pct(c);
          const betsForColor = (live.bets||[]).filter(b=>b.color===c);
          return (
            <Card key={c} style={{ marginBottom:12, border:`1px solid ${colorMap[c]}44`, background:`${colorMap[c]}07` }}>
              {/* Header */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:colorMap[c], boxShadow:`0 0 12px ${colorMap[c]}66` }} />
                  <div>
                    <div style={{ fontSize:18, fontWeight:900, color:colorMap[c] }}>{c.toUpperCase()}</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{d.users} user{d.users!==1?"s":""} bet</div>
                  </div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22, fontWeight:900, color:colorMap[c] }}>💎{fmt(d.diamonds)}</div>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontWeight:700 }}>{p}% of pool</div>
                </div>
              </div>
              {/* Bar */}
              <div style={{ height:10, background:"rgba(255,255,255,0.06)", borderRadius:99, overflow:"hidden", marginBottom:10 }}>
                <div style={{ height:"100%", width:`${p}%`, background:colorMap[c], borderRadius:99, transition:"width 0.5s", boxShadow:`0 0 8px ${colorMap[c]}` }} />
              </div>
              {/* User list toggle */}
              {betsForColor.length > 0 && (
                <>
                  <button onClick={()=>setDetailColor(detailColor===c?null:c)}
                    style={{ background:"none", border:`1px solid ${colorMap[c]}55`, borderRadius:20, color:colorMap[c], fontSize:12, fontWeight:700, cursor:"pointer", padding:"4px 14px", marginBottom: detailColor===c ? 8 : 0 }}>
                    {detailColor===c ? "▲ Hide" : "▼ Show"} {betsForColor.length} player{betsForColor.length!==1?"s":""}
                  </button>
                  {detailColor === c && (
                    <div style={{ maxHeight:200, overflowY:"auto" }}>
                      {/* Table header */}
                      <div style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:700, borderBottom:`1px solid rgba(255,255,255,0.06)`, marginBottom:4 }}>
                        <span>PLAYER</span><span>AMOUNT</span><span>TIME</span>
                      </div>
                      {betsForColor.map((b,i)=>{
                        const u = allUsers.find(u=>u.id===b.userId);
                        return (
                          <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid rgba(255,255,255,0.04)", fontSize:13 }}>
                            <div>
                              <div style={{ fontWeight:700 }}>{b.userName||"Unknown"}</div>
                              {u && <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>📱{u.phone}</div>}
                            </div>
                            <div style={{ fontWeight:800, color:colorMap[c] }}>💎{b.amt}</div>
                            <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{timeAgo(b.time)}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              )}
              {betsForColor.length === 0 && (
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.25)", fontStyle:"italic" }}>No bets on {c} this round</div>
              )}
            </Card>
          );
        })}

        {/* ─ NEXT ROUND CONTROL ─ */}
        <div style={{ fontSize:11, fontWeight:800, color:"rgba(255,255,255,0.4)", letterSpacing:1.5, marginBottom:10, marginTop:6 }}>
          🎯 NEXT ROUND CONTROL
        </div>

        {/* Current selection */}
        <Card style={{ marginBottom:12, background: nextColor?`${colorMap[nextColor]}12`:"rgba(0,212,255,0.06)", border:`1px solid ${nextColor?colorMap[nextColor]+"44":"rgba(0,212,255,0.2)"}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:"50%", background:nextColor?colorMap[nextColor]:"rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:nextColor?0:22, boxShadow:nextColor?`0 0 16px ${colorMap[nextColor]}`:"none" }}>
              {!nextColor && "🎲"}
            </div>
            <div>
              <div style={{ fontSize:17, fontWeight:900, color:nextColor?colorMap[nextColor]:S.neonBlue }}>
                {nextColor ? `${nextColor.toUpperCase()} WILL WIN` : "NOT SET"}
              </div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>
                {nextColor ? "Next round force set (once use)" : "Choose below to control next round"}
              </div>
            </div>
          </div>
        </Card>

        {/* Profit preview */}
        {nextColor && total > 0 && (
          <Card style={{ marginBottom:12, background:"rgba(0,255,136,0.07)", border:"1px solid rgba(0,255,136,0.2)" }}>
            <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.5)", marginBottom:6 }}>💹 Profit Preview (if {nextColor} wins)</div>

              {(() => {

                const profit  = losers - (payout - winPool);

                    <div style={{ flex:1, textAlign:"center" }}>
                      <div style={{ fontSize:15, fontWeight:900, color:"#ff6b6b" }}>💎{fmt(payout)}</div>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)" }}>Winner payout</div>

                    <div style={{ flex:1, textAlign:"center" }}>

                  </>

              })()}
            </div>

            }}>

        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          <Btn full variant="green" onClick={setAuto}>🤖 Smart Auto (Min Payout)</Btn>
          <Btn full variant="ghost" onClick={clearForce}>🎲 Random</Btn>
        </div>

        {/* ─ ALL-TIME COLOR HISTORY ─ */}

                <Card key={c} style={{ flex:1, textAlign:"center", padding:14, background:`${colorMap[c]}08`, border:`1px solid ${colorMap[c]}33` }}>

                  <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.5)", marginTop:3 }}>
                    {allTimeStats[c].total > 0 ? Math.round((allTimeStats[c].wins/allTimeStats[c].total)*100) : 0}%

};

const AdminWithdrawals = ({ showToast }) => {  const [tick, setTick] = useState(0);
  const txns = (DB.get("dp_transactions") || []).filter(t => t.type === "withdrawal");
  const users = DB.get("dp_users") || [];
  const getUserName = (id) => users.find(u => u.id === id)?.name || id;

  const approve = (txnId) => {
    const all = DB.get("dp_transactions") || [];
    const updated = all.map(t => t.id === txnId ? { ...t, status: "success", approvedAt: new Date().toISOString() } : t);
    DB.set("dp_transactions", updated);
    setTick(t => t + 1);
    showToast("Withdrawal approved!", "success");
  };

  const reject = (txnId, userId, diamonds) => {
    const all = DB.get("dp_transactions") || [];
    const updated = all.map(t => t.id === txnId ? { ...t, status: "rejected" } : t);
    DB.set("dp_transactions", updated);
    // Refund diamonds
    const allUsers = DB.get("dp_users") || [];
    const updatedUsers = allUsers.map(u => u.id === userId ? { ...u, diamonds: u.diamonds + Math.abs(diamonds) } : u);
    DB.set("dp_users", updatedUsers);
    setTick(t => t + 1);
    showToast("Rejected & diamonds refunded", "info");
  };

  const latestTxns = (DB.get("dp_transactions") || []).filter(t => t.type === "withdrawal");

  return (
    <div style={S.page}>
      <TopBar title="⬆️ Payouts" />
      <div style={{ padding: "0 20px" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[["Pending", latestTxns.filter(t => t.status === "pending").length, S.neonGold],
            ["Approved", latestTxns.filter(t => t.status === "success").length, S.neonGreen],
            ["Rejected", latestTxns.filter(t => t.status === "rejected").length, "#ff6b6b"]].map(([l, v, c]) => (
            <Card key={l} style={{ flex: 1, textAlign: "center", padding: 10 }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: c }}>{v}</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{l}</div>
            </Card>
          ))}
        </div>
        {latestTxns.length === 0 ? <div style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.3)" }}>No withdrawal requests yet</div> :
          latestTxns.map(t => (
            <Card key={t.id} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                <div>
                  <div style={{ fontWeight: 700 }}>{getUserName(t.userId)}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{t.note} · {timeAgo(t.date)}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 800, color: "#ff6b6b" }}>{t.diamonds}💎</div>
                  <div style={{ fontSize: 12, color: S.neonGold }}>{fmtINR(t.amount || 0)} net</div>
                </div>
              </div>
              {t.status === "pending"
                ? <div style={{ display: "flex", gap: 8 }}>
                    <Btn sm full variant="green" onClick={() => approve(t.id)}>✓ Approve & Pay</Btn>
                    <Btn sm full variant="danger" onClick={() => reject(t.id, t.userId, t.diamonds)}>✕ Reject</Btn>
                  </div>
                : <Badge label={t.status === "success" ? "✓ Approved" : "✕ Rejected"} color={t.status === "success" ? S.neonGreen : "#ff6b6b"} />}
            </Card>
          ))}
      </div>
    </div>
  );
};

const NotifPanel = ({ open, onClose, userId }) => {
  const [notifs, setNotifs] = useState([]);
  useEffect(() => {
    if (open) {
      const txns = (DB.get("dp_transactions") || []).filter(t => t.userId === userId && (t.type === "bonus" || t.type === "deposit" || t.type === "withdrawal")).slice(0, 15);
      setNotifs(txns);
    }
  }, [open, userId]);
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 500 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: "85%", maxWidth: 360, background: "#13132e", padding: 20, overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>🔔 Activity</div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.08)", border: "none", color: "#fff", borderRadius: 50, width: 32, height: 32, cursor: "pointer" }}>✕</button>
        </div>
        {notifs.length === 0
          ? <div style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.3)" }}>No recent activity</div>
          : notifs.map(n => (
            <div key={n.id} style={{ display: "flex", gap: 12, padding: "12px 0", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ fontSize: 22 }}>{n.type === "deposit" ? "💰" : n.type === "withdrawal" ? "⬆️" : "🎁"}</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{n.note}</div>
                <div style={{ fontSize: 12, color: n.diamonds > 0 ? S.neonGreen : "#ff6b6b", marginBottom: 2 }}>{n.diamonds > 0 ? "+" : ""}{n.diamonds}💎</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{timeAgo(n.date)}</div>
              </div>
            </div>
          ))}
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("landing");
  const [user, setUser] = useState(null);
  const [notifOpen, setNotifOpen] = useState(false);
  const [toast, setToast] = useState({ msg: "", type: "info" });
  const [showSplash, setShowSplash] = useState(true);
  const toastRef = useRef(null);

  useEffect(() => { initDB(); }, []);

  // Restore session on reload
  useEffect(() => {
    const session = DB.get("dp_session");
    if (session) {
      const users = DB.get("dp_users") || [];
      const u = users.find(x => x.id === session.userId);
      if (u) { setUser(u); setPage(u.isAdmin ? "admin" : "home"); }
    }
  }, []);

  const showToast = (msg, type = "info") => {
    setToast({ msg, type });
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast({ msg: "", type: "info" }), 3200);
  };

  const logout = () => {
    DB.del("dp_session");
    setUser(null);
    setPage("landing");
    showToast("Logged out successfully", "info");
  };

  const isAdmin = user?.isAdmin;
  const cfg = DB.get("dp_platform_config") || {};

  // Maintenance check for non-admins
  if (cfg.maintenanceMode && user && !isAdmin) {
    return (
      <>
        <style>{CSS}</style>
        <div style={{ ...S.app, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
          <div style={{ textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>🔧</div>
            <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>Under Maintenance</div>
            <div style={{ color: "rgba(255,255,255,0.5)" }}>We'll be back soon! Check back later.</div>
            <Btn style={{ marginTop: 20 }} onClick={logout}>← Go Back</Btn>
          </div>
        </div>
      </>
    );
  }

  const renderPage = () => {
    if (!user) {
      if (page === "auth") return <AuthPage mode={page === "auth" ? (window.__authMode || "login") : "login"} setUser={setUser} setPage={setPage} showToast={showToast} />;
      return <LandingPage setPage={p => { if (p === "auth") {} setPage(p); }} setAuthMode={m => { window.__authMode = m; }} />;
    }
    if (isAdmin) {
      if (page === "admin_agents")  return <AdminAgents showToast={showToast} />;
      if (page === "admin_users")   return <AdminUsers />;
      if (page === "admin_txn")     return <AdminTxns />;
      if (page === "admin_deposits")return <AdminDeposits showToast={showToast} />;
      if (page === "admin_withdraw")return <AdminWithdrawals showToast={showToast} />;
      if (page === "admin_config")  return <AdminConfig showToast={showToast} />;
      if (page === "admin_color")   return <AdminColorStats showToast={showToast} />;
      return <AdminOverview setPage={setPage} onLogout={logout} />;
    }
    const props = { user, setUser, setPage, showToast };
    switch (page) {
      case "home": return <HomePage {...props} setNotifOpen={setNotifOpen} notifications={[]} />;
      case "games": return <GamesPage setPage={setPage} />;
      case "game_color": return <ColorGame {...props} />;
      case "game_dice": return <DiceGame {...props} />;
      case "game_number": return <NumberGame {...props} />;
      case "game_scratch": return <ScratchGame {...props} />;
      case "agent":  return <AgentPage {...props} />;
      case "wallet": case "buy": return <WalletPage {...props} />;
      case "profile": return <ProfilePage {...props} onLogout={logout} />;
      case "leaderboard": return <LeaderboardPage user={user} />;
      default: return <HomePage {...props} setNotifOpen={setNotifOpen} notifications={[]} />;
    }
  };

  const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; background: #0a0a1a; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.12); opacity:0.85; } }

    /* Splash animations */
    @keyframes diamondDrop {
      0%   { transform: translateY(-80px) scale(0.3) rotate(-20deg); opacity:0; }
      60%  { transform: translateY(10px)  scale(1.15) rotate(5deg);  opacity:1; }
      100% { transform: translateY(0)     scale(1)    rotate(0deg);  opacity:1; }
    }
    @keyframes diamondFloat {
      0%,100% { transform: translateY(0)   rotate(0deg); }
      50%      { transform: translateY(-10px) rotate(3deg); }
    }
    @keyframes charPop {
      0%   { transform: translateY(14px) scale(0.5); opacity:0; }
      70%  { transform: translateY(-3px) scale(1.12); opacity:1; }
      100% { transform: translateY(0)   scale(1);    opacity:1; }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes loadBar {
      0%   { width: 0%; }
      20%  { width: 15%; }
      50%  { width: 55%; }
      80%  { width: 80%; }
      100% { width: 100%; }
    }
    @keyframes pulseRing0 { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.3} }
    @keyframes pulseRing1 { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4} 50%{transform:translate(-50%,-50%) scale(1.04);opacity:0.2} }
    @keyframes pulseRing2 { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.3} 50%{transform:translate(-50%,-50%) scale(1.03);opacity:0.15} }
    @keyframes pulseRing3 { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.2} 50%{transform:translate(-50%,-50%) scale(1.02);opacity:0.1} }
    @keyframes floatP0 { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) scale(1.1)} }
    @keyframes floatP1 { 0%,100%{transform:translateY(-6px)} 50%{transform:translateY(6px)} }
    @keyframes floatP2 { 0%,100%{transform:translateY(4px) rotate(0deg)} 50%{transform:translateY(-8px) rotate(180deg)} }
    @keyframes floatP3 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* Game animations */
    @keyframes confettiFall0 { 0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1} 100%{transform:translateY(-90px) scale(0) rotate(360deg);opacity:0} }
    @keyframes confettiFall1 { 0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1} 100%{transform:translateY(-70px) translateX(30px) scale(0) rotate(-180deg);opacity:0} }
    @keyframes confettiFall2 { 0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1} 100%{transform:translateY(-80px) translateX(-20px) scale(0) rotate(270deg);opacity:0} }
    @keyframes resultSlide { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

    ::-webkit-scrollbar { width: 0; }
    input, button { font-family: 'Inter', sans-serif; }
  `;

  // Handle landing page auth navigation
  const handleSetPage = (p) => {
    if (p === "auth") setPage("auth");
    else setPage(p);
  };

  return (
    <>
      <style>{CSS}</style>
      <Toast msg={toast.msg} type={toast.type} />
      {showSplash && <SplashScreen onDone={() => setShowSplash(false)} />}
      <div style={S.app}>
        <div style={{ background: S.gradDark, minHeight: "100vh" }}>
          {!user ? (
            page === "auth"
              ? <AuthPage mode={window.__authMode || "login"} setUser={setUser} setPage={setPage} showToast={showToast} />
              : <LandingPage setPage={handleSetPage} setAuthMode={m => { window.__authMode = m; setPage("auth"); }} />
          ) : (
            <>
              {renderPage()}
              <BottomNav page={page} setPage={setPage} isAdmin={isAdmin} />
              <NotifPanel open={notifOpen} onClose={() => setNotifOpen(false)} userId={user.id} />
            </>
          )}
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
